name: Publish dataset release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish (e.g. v3.6.7)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release with dataset artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION}"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0

      - name: Verify dataset directory exists
        run: |
          DIR="data/${{ steps.meta.outputs.tag }}"
          if [ ! -d "$DIR" ]; then
            echo "::error::Expected dataset directory $DIR not found in tag ${{ steps.meta.outputs.tag }}"
            exit 1
          fi
          echo "Dataset directory $DIR exists with $(find "$DIR" -type f | wc -l) files"

      - name: Verify checksums
        run: |
          DIR="data/${{ steps.meta.outputs.tag }}"
          cd "$DIR"
          if [ -f checksums.sha256 ]; then
            sha256sum -c checksums.sha256
          else
            echo "::warning::No checksums.sha256 found in $DIR"
          fi

      - name: Build release archive
        id: archive
        run: |
          DIR="data/${{ steps.meta.outputs.tag }}"
          ARCHIVE="vsc-pricing-${{ steps.meta.outputs.tag }}.zip"
          cd data
          zip -r "../${ARCHIVE}" "${{ steps.meta.outputs.tag }}"
          cd ..
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          ls -la "${ARCHIVE}"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          CHANGELOG="data/${{ steps.meta.outputs.tag }}/CHANGELOG.md"
          NOTES_FILE="release_notes.md"
          if [ -f "$CHANGELOG" ]; then
            awk '/^## \[/{count++} count==1' "$CHANGELOG" > "$NOTES_FILE"
            echo "---" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "**Archive:** \`${{ steps.archive.outputs.archive }}\`" >> "$NOTES_FILE"
            echo "**Schema version:** \`${{ steps.meta.outputs.version }}\`" >> "$NOTES_FILE"
            echo "**License:** CC BY 4.0 — attribution required" >> "$NOTES_FILE"
          else
            echo "Release ${{ steps.meta.outputs.tag }} — see repository for details." > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "OptimalCover VSC Pricing Dataset ${{ steps.meta.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            ${{ steps.archive.outputs.archive }}
            data/${{ steps.meta.outputs.tag }}/checksums.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
